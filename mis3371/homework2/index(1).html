<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Octo Optics Registration Form</title>

  <!-- External CSS file -->
  <link href="css/style.css" rel="stylesheet">
</head>

<body>
  <header>
    <img src="images/octo_optics.png" height="150" width="150" alt="Octo Optics logo">
    <h1>Octo Optics</h1>
  </header>

  <main>
    <form id="patientForm" name="patientForm" action="#" method="post">

      <section class="top-section">
        <div class="logo-box">
          <h3>Online Patient Registration Form</h3>
        </div>

        <div class="date-box">
          Today's Date:
          <span id="todayDate"></span>
        </div>
      </section>

      <fieldset>
        <legend>Personal Information</legend>

        <table>
          <tr>
            <td class="question-label"><label for="firstName">First Name:</label></td>
            <td>
              <input type="text" id="firstName" name="firstName" maxlength="30" required
                pattern="[A-Za-z'-]{1,30}"
                title="Enter 1 to 30 characters. Letters, apostrophes, and dashes only.">
              <span id="firstNameError" class="error-message"></span>
            </td>

            <td class="question-label"><label for="middleInitial">MI:</label></td>
            <td>
              <input type="text" id="middleInitial" name="middleInitial" maxlength="1"
                class="small-input" pattern="[A-Za-z]?"
                title="Enter one letter only, or leave blank.">
            </td>

            <td class="question-label"><label for="lastName">Last Name:</label></td>
            <td>
              <input type="text" id="lastName" name="lastName" maxlength="30" required
                pattern="[A-Za-z'2-5-]{1,30}"
                title="Enter 1 to 30 characters. Letters, apostrophes, dashes, and numbers 2 through 5 only.">
            </td>
          </tr>

          <tr>
            <td class="question-label"><label for="dob">Date of Birth:</label></td>
            <td>
              <input type="date" id="dob" name="dob" required
                title="Enter your birthday. It cannot be in the future or more than 120 years ago.">
              <span id="dobError" class="error-message"></span>
            </td>
          </tr>

          <tr>
            <td class="question-label"><label for="ssn">Social Security:</label></td>
            <td>
              <input type="password" id="ssn" name="ssn" maxlength="11" required
                pattern="[0-9]{3}-?[0-9]{2}-?[0-9]{4}"
                title="Enter SSN as 123456789 or 123-45-6789. This field is hidden as you type.">
            </td>
          </tr>

          <tr>
            <td class="question-label"><label for="address1">Address Line 1:</label></td>
            <td colspan="3">
              <input type="text" id="address1" name="address1" class="long-input"
                minlength="2" maxlength="30" required
                title="Enter your street address. Use 2 to 30 characters.">
            </td>
          </tr>

          <tr>
            <td class="question-label"><label for="address2">Address Line 2:</label></td>
            <td colspan="3">
              <input type="text" id="address2" name="address2" class="long-input"
                minlength="2" maxlength="30"
                title="Optional. If entered, use 2 to 30 characters.">
            </td>
          </tr>
