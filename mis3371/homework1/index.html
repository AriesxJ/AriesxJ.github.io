<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">

      <title>Octo Optics Registration Form</title>

    <link href="css/style.css" rel="stylesheet">
  </head>

<body>

  <header>
    <img src="/images/octo_optics.png">
    <h1>Octo Optics</h1>
    <p id="tagline">Online Patient Registration Form</p>
  </header>

  <main>

    <form id="patientForm" name="patientForm" action="#" method="post">

      <section class="top-section">
        <div class="logo-box">
          Logo & Brand Name Here<br>
          Octo Optics
        </div>

        <div class="date-box">
          Today's Date:
          <span id="todayDate"></span>
        </div>
      </section>

      <fieldset>
        <legend>Personal Information</legend>

        <table>
          <tr>
            <td class="question-label"><label for="firstName">First Name:</label></td>
            <td><input type="text" id="firstName" name="firstName" maxlength="30"></td>

            <td><label for="middleInitial">MI:</label></td>
            <td><input type="text" id="middleInitial" name="middleInitial" maxlength="1" class="small-input"></td>

            <td><label for="lastName">Last Name:</label></td>
            <td><input type="text" id="lastName" name="lastName" maxlength="30"></td>
          </tr>

          <tr>
            <td><label for="dob">Date of Birth:</label></td>
            <td><input type="date" id="dob" name="dob"></td>
          </tr>

          <tr>
            <td><label for="ssn">Social Security:</label></td>
            <td><input type="password" id="ssn" name="ssn" maxlength="11"></td>
          </tr>

          <tr>
            <td><label for="address1">Address Line 1:</label></td>
            <td colspan="3"><input type="text" id="address1" name="address1" class="long-input" maxlength="30"></td>
          </tr>

          <tr>
            <td><label for="address2">Address Line 2:</label></td>
            <td colspan="3"><input type="text" id="address2" name="address2" class="long-input" maxlength="30"></td>
          </tr>

          <tr>
            <td><label for="city">City:</label></td>
            <td><input type="text" id="city" name="city"></td>

            <td><label for="state">State:</label></td>
            <td>
              <select id="state" name="state">
                <option value="">Choose</option>
                <option value="AL">AL</option>
                <option value="AK">AK</option>
                <option value="AZ">AZ</option>
                <option value="AS">AS</option>
                <option value="CA">CA</option>
                <option value="CO">CO</option>
                <option value="CT">CT</option>
                <option value="DE">DE</option>
                <option value="DC">DC</option>
                <option value="FL">FL</option>
                <option value="GA">GA</option>
                <option value="GU">GU</option>
                <option value="HI">HI</option>
                <option value="ID">ID</option>
                <option value="IL">IL</option>
                <option value="IN">IN</option>
                <option value="IA">IA</option>
                <option value="KS">KS</option>
                <option value="KY">KY</option>
                <option value="LA">LA</option>
                <option value="ME">ME</option>
                <option value="MD">MD</option>
                <option value="MA">MA</option>
                <option value="MI">MI</option>
                <option value="MN">MN</option>
                <option value="MS">MS</option>
                <option value="MO">MO</option>
                <option value="MT">MT</option>
                <option value="NE">NE</option>
                <option value="NV">NV</option>
                <option value="NH">NH</option>
                <option value="NJ">NJ</option>
                <option value="NM">NM</option>
                <option value="NY">NY</option>
                <option value="NC">NC</option>
                <option value="ND">ND</option>
                <option value="MP">MP</option>
                <option value="OH">OH</option>
                <option value="OK">OK</option>
                <option value="OR">OR</option>
                <option value="PA">PA</option>
                <option value="PR">PR</option>
                <option value="RI">RI</option>
                <option value="SC">SC</option>
                <option value="SD">SD</option>
                <option value="TN">TN</option>
                <option value="TX">TX</option>
                <option value="TT">TT</option>
                <option value="UT">UT</option>
                <option value="VT">VT</option>
                <option value="VA">VA</option>
                <option value="VI">VI</option>
                <option value="WA">WA</option>
                <option value="WV">WV</option>
                <option value="WI">WI</option>
                <option value="WY">WY</option>
              </select>
            </td>

            <td><label for="zip">Zip Code:</label></td>
            <td><input type="text" id="zip" name="zip" class="zip-input"></td>
          </tr>

          <tr>
            <td><label for="email">Email Address:</label></td>
            <td><input type="email" id="email" name="email"></td>
          </tr>

          <tr>
            <td><label for="phone">Phone Number:</label></td>
            <td><input type="tel" id="phone" name="phone"></td>
          </tr>

          <tr>
            <td><label for="userId">New User ID:</label></td>
            <td><input type="text" id="userId" name="userId"></td>
          </tr>

          <tr>
            <td><label for="password">Password:</label></td>
            <td><input type="password" id="password" name="password"></td>
          </tr>

          <tr>
            <td><label for="confirmPassword">Re-enter Password:</label></td>
            <td><input type="password" id="confirmPassword" name="confirmPassword"></td>
          </tr>
        </table>
      </fieldset>

      <fieldset>
        <legend>Reason for Visit</legend>

        <p>Check any that apply.</p>

        <label><input type="checkbox" name="reason" value="eyeCheck"> Eye Check Up</label><br>
        <label><input type="checkbox" name="reason" value="contacts"> Contact Lens</label><br>
        <label><input type="checkbox" name="reason" value="glasses"> Glasses</label><br>
        <label><input type="checkbox" name="reason" value="repair"> Glasses Repair</label><br>
        <label><input type="checkbox" name="reason" value="other"> Other</label><br>

        <label for="otherReason">Describe other reason here:</label>
        <textarea id="otherReason" name="otherReason"></textarea>
      </fieldset>

      <fieldset>
        <legend>Health and Account Details</legend>

        <table>
          <tr>
            <td>Currently have health insurance?</td>
            <td>
              <label><input type="radio" name="insurance" value="yes"> Yes</label>
              <label><input type="radio" name="insurance" value="no"> No</label>
            </td>
          </tr>

          <tr>
            <td>Are you a new patient?</td>
            <td>
              <label><input type="radio" name="newPatient" value="yes"> Yes</label>
              <label><input type="radio" name="newPatient" value="no"> No</label>
            </td>
          </tr>

          <tr>
            <td>Gender:</td>
            <td>
              <label><input type="radio" name="gender" value="male"> Male</label>
              <label><input type="radio" name="gender" value="female"> Female</label>
              <label><input type="radio" name="gender" value="other"> Other</label>
            </td>
          </tr>

          <tr>
            <td><label for="screenTime">Average Daily Screen Time:</label></td>
            <td>
              0 hrs
              <input type="range" id="screenTime" name="screenTime" min="0" max="12">
              12+ hrs
            </td>
          </tr>

          <tr>
            <td><label for="age">Age:</label></td>
            <td><input type="number" id="age" name="age" min="1" max="120"></td>
          </tr>
        </table>
      </fieldset>    

      <div class="button-area">
        <input type="reset" value="CLEAR AND START OVER">
        <input type="submit" value="SUBMIT FORM">
      </div>
          
            
  <footer>
    This is a temp footer
  </footer>

  <script>
    const today = new Date();
    document.getElementById("todayDate").textContent = today.toLocaleDateString();
  </script>

    </body>
</html>
